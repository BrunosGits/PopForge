name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm run tauri build

      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/PopForge_*.dmg
          generate_release_notes: true
          body: |
            ## Unsigned Build

            This app is not code-signed. macOS Gatekeeper will block it when double-clicking.

            **Workaround:** Right-click (or Ctrl+click) the app → **Open** → click **Open** in the dialog. This only needs to be done once — subsequent launches work normally.

            ### Supported inputs
            - ISO (PS1 disc image)
            - BIN/CUE (PS1 disc image)

            ### Supported output
            - PBP (PSP EBOOT.PBP)

            ### Extraction
            - PBP → BIN+CUE
